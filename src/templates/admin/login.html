<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Admin Login — Stewardwell</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
		.card { background: #fff; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
		h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
		p { color: #64748b; font-size: .88rem; margin-bottom: 24px; }
		label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 4px; color: #374151; }
		input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .92rem; margin-bottom: 16px; }
		button { width: 100%; padding: 11px; background: #4f8ef7; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
		.flash { background: #fee2e2; color: #b91c1c; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: .86rem; }
	</style>
</head>
<body>
<div class="card">
	<h1>Admin Login</h1>
	<p>Stewardwell superuser access only.</p>
	{% with messages = get_flashed_messages(with_categories=true) %}
	{% for cat, msg in messages %}
	<div class="flash">{{ msg }}</div>
	{% endfor %}
	{% endwith %}
	<form method="post">
		<label>Email</label>
		<input type="email" name="email" autocomplete="username" required />
		<label>Password</label>
		<input type="password" name="password" autocomplete="current-password" required />
		<button type="submit">Sign in</button>
	</form>
</div>
</body>
</html>
