{% extends "bases/public.html" %}

{% block title %}Forgot Password — Stewardwell{% endblock %}

{% block content %}
<section class="auth-grid" style="width:min(600px,100%);margin:0 auto;">
  <article class="panel" aria-labelledby="fp-title">
    <div class="pill">Password reset</div>
    <h1 id="fp-title" style="font-size:30px;line-height:1.1;margin-top:10px;">Forgot your password?</h1>
    <p class="muted" style="margin-top:8px;">Enter the email address you registered with and we'll send you a reset link.</p>

    <form action="{{ url_for('public.forgot_password') }}" method="post" style="margin-top:20px;display:grid;gap:14px;">
      <div>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="parent@family.com" required autofocus />
      </div>
      <button class="btn primary" type="submit">Send reset link</button>
    </form>

    <a href="{{ url_for('public.login') }}" style="margin-top:14px;display:inline-block;color:var(--muted);font-size:13px;">← Back to login</a>
  </article>
</section>
{% endblock %}
