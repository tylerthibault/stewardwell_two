{% extends "bases/public.html" %}

{% block title %}Reset Password — Stewardwell{% endblock %}

{% block content %}
<section class="auth-grid" style="width:min(600px,100%);margin:0 auto;">
  <article class="panel" aria-labelledby="rp-title">
    <div class="pill">Choose a new password</div>
    <h1 id="rp-title" style="font-size:30px;line-height:1.1;margin-top:10px;">Reset your password</h1>
    <p class="muted" style="margin-top:8px;">Enter a new password below. Must be at least 8 characters.</p>

    <form action="{{ url_for('public.reset_password', token=token) }}" method="post" style="margin-top:20px;display:grid;gap:14px;">
      <div>
        <label for="password">New password</label>
        <input id="password" name="password" type="password" placeholder="At least 8 characters" required autofocus />
      </div>
      <div>
        <label for="confirm_password">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="Repeat new password" required />
      </div>
      <button class="btn primary" type="submit">Set new password</button>
    </form>

    <a href="{{ url_for('public.login') }}" style="margin-top:14px;display:inline-block;color:var(--muted);font-size:13px;">← Back to login</a>
  </article>
</section>
{% endblock %}
